# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration

[remote.github]
owner = "hxreborn"
repo = "gboard-material-expressive-black"

[changelog]
header = ""
body = """
{%- macro remote_url() -%}
https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{%- macro commit(commit) -%}
- [`{{ commit.id | truncate(length=7, end="") }}`]({{ self::remote_url() }}/commit/{{ commit.id }}) \
  {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
  {{ commit.message | upper_first | trim }}\
  {% if commit.breaking %} [**breaking**]{% endif %}\
  {% if commit.remote.username %} by @{{ commit.remote.username }}\
  {%- if commit.remote.pr_number %} in [#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }}){% endif %}{% endif %}
{%- if commit.body %}

{{ commit.body | indent(prefix="  ", first=true, blank=true) }}
{%- endif %}
{%- for footer in commit.footers %}
{%- if footer.token != "Signed-off-by" and footer.token != "Co-authored-by" %}

  > {{ footer.token }}{{ footer.separator }}{{ footer.value }}
{%- endif %}
{%- endfor %}
{% endmacro -%}

## What's Changed

{% if commits | length == 0 -%}
No user-facing changes in this release.
{%- else %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits | filter(attribute="scope") | sort(attribute="scope") %}
{{ self::commit(commit=commit) }}
{%- endfor -%}
{% for commit in commits %}
{%- if not commit.scope %}
{{ self::commit(commit=commit) }}
{%- endif -%}
{%- endfor %}
{% endfor %}
{%- endif %}

"""
footer = ""
trim = false
postprocessors = [
  { pattern = ' +\n', replace = "\n" },
]

[git]
conventional_commits = true
filter_unconventional = true
protect_breaking_commits = true
commit_preprocessors = [
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "" },
]
commit_parsers = [
  { message = "^feat", group = "<!-- 00 -->Features" },
  { message = "^[fF]ix", group = "<!-- 01 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 02 -->Performance Improvements" },
  { message = "^security", group = "<!-- 03 -->Security" },
  { body = ".*[Ss]ecurity", group = "<!-- 03 -->Security" },
  { message = "^refactor", group = "<!-- 04 -->Refactor" },
  { message = "^[Rr]evert", group = "<!-- 05 -->Reverts" },
  { message = '^(build|chore)\(deps(-dev)?\)', group = "<!-- 06 -->Dependencies" },
  { message = "^doc", group = "<!-- 07 -->Documentation" },
  { message = "^style", group = "<!-- 08 -->Styling" },
  { message = "^build", group = "<!-- 09 -->Build" },
  { message = "^ci", group = "<!-- 10 -->CI" },
  { message = "^test", group = "<!-- 11 -->Tests" },
  # Mute release/changelog noise only
  { message = '^chore(\(release\))?:\s*(prepare|bump|align|v?\d+\.\d+)', skip = true },
  { message = '^release:\s*(bump|prepare|v?\d+\.\d+)', skip = true },
  { message = '^chore\(changelog\)', skip = true },
  # Catch-all
  { message = ".*", group = "<!-- 99 -->Miscellaneous" },
]
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "newest"
